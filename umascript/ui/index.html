<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMAScript IDE - Visual Novel Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="vn-bg"></div>

  <div class="top-menu">
    <button class="btn btn-clear" onclick="limpiarEditor()">🗑 Limpiar</button>
    <button class="btn btn-run" id="btn-run" onclick="iniciarCarrera()">🏁 INICIAR CARRERA</button>
  </div>

  <div class="vn-workspace">

    <div class="character-col">
      <div class="vn-character-frame" style="margin-top: 20px;">
        <img src="hacker.jpeg" alt="Personaje" class="vn-character-sprite" id="character-sprite">
      </div>
    </div>

    <div class="vn-editor-panel">
      <div class="examples-bar">
        <span class="examples-label">Válidos:</span>
        <button class="btn-example" onclick="cargarEjemplo('RUN1')">RUN1</button>
        <button class="btn-example" onclick="cargarEjemplo('RUN2')">RUN2</button>
        <button class="btn-example" onclick="cargarEjemplo('RUN3')">RUN3</button>
        <button class="btn-example" onclick="cargarEjemplo('RUN4')">RUN4</button>
        <button class="btn-example" onclick="cargarEjemplo('RUN5')">RUN5</button>
        <span class="examples-sep">|</span>
        <span class="examples-label">Errores:</span>
        <button class="btn-example btn-error" onclick="cargarEjemplo('DROPPEO1')">DROP1</button>
        <button class="btn-example btn-error" onclick="cargarEjemplo('DROPPEO2')">DROP2</button>
        <button class="btn-example btn-error" onclick="cargarEjemplo('DROPPEO3')">DROP3</button>
        <button class="btn-example btn-error" onclick="cargarEjemplo('DROPPEO4')">DROP4</button>
        <button class="btn-example btn-error" onclick="cargarEjemplo('DROPPEO5')">DROP5</button>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="line-nums"></div>
        <div class="editor-container">
          <pre id="highlighted-layer" aria-hidden="true"><code></code></pre>
          <textarea id="editor" spellcheck="false" placeholder="Escribe tu código UmaScript aquí..."></textarea>
        </div>
      </div>
    </div>

  

    <div class="vn-dialog-box" id="dialog-box">
      <div class="vn-dialog-content">
        <div class="results-tabs">
          <div class="results-tab active" data-out="tokens" onclick="showTab(this,'tokens')">
            🎯 Tokens <span class="tab-count" id="count-tokens">0</span>
          </div>
          <div class="results-tab" data-out="symbols" onclick="showTab(this,'symbols')">
            📋 Stats <span class="tab-count" id="count-symbols">0</span>
          </div>
          <div class="results-tab" data-out="errors" onclick="showTab(this,'errors')">
            ⚠️ Faltas <span class="tab-count" id="count-errors">0</span>
          </div>
          <div class="results-tab" data-out="tree" onclick="showTab(this,'tree')">
            🌳 Árbol
          </div>
          <button class="btn-fullscreen" id="btn-fullscreen" onclick="toggleFullscreen()" style="display:none">
            ⛶ Full
          </button>
        </div>
        <div class="results-body" id="results-body">
          <span class="empty-msg">Esperando inicio de carrera...</span>
        </div>
      </div>
    </div>

  </div>

  <div class="statusbar">
    <span>🏆 Campus Jutiapa 2026</span>
    <span id="status-tokens">Tokens: —</span>
    <span id="status-errors">Errores: —</span>
    <span id="status-symbols">Símbolos: —</span>
    <span class="statusbar-right">UMAScript v1.0 | UTF-8</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
