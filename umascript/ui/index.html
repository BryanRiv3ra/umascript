<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UmaScript IDE v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <span class="topbar-logo">🐴 UmaScript IDE</span>
    <span class="topbar-sub">Compilador v1.0 — Análisis Léxico y Sintáctico</span>
    <div class="topbar-spacer"></div>
    <button class="btn btn-clear" onclick="limpiarEditor()">🗑 Limpiar</button>
    <button class="btn btn-run" id="btn-run" onclick="iniciarCarrera()">
      <span class="btn-icon">🏁</span>
      <span class="btn-text">Iniciar Carrera</span>
    </button>
  </div>

  <div class="workspace">

    <div class="editor-panel">
      <div class="editor-tabs">
        <span class="tab-icon">📄</span>
        <div class="editor-tab active">programa.uma</div>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="line-nums"></div>
        <textarea
          id="editor"
          spellcheck="false"
          placeholder="Escribe tu código UmaScript aquí..."></textarea>
      </div>
    </div>

    <div class="results-panel">
      <div class="results-tabs">
        <div class="results-tab active" data-out="tokens" onclick="showTab(this,'tokens')">
          🎯 Tokens <span class="tab-count" id="count-tokens">0</span>
        </div>
        <div class="results-tab" data-out="symbols" onclick="showTab(this,'symbols')">
          📋 Símbolos <span class="tab-count" id="count-symbols">0</span>
        </div>
        <div class="results-tab" data-out="errors" onclick="showTab(this,'errors')">
          ⚠️ Errores <span class="tab-count" id="count-errors">0</span>
        </div>
        <div class="results-tab" data-out="tree" onclick="showTab(this,'tree')">
          🌳 Árbol
        </div>
        <button class="btn-fullscreen" id="btn-fullscreen" onclick="toggleFullscreen()" style="display:none">
          ⛶ Pantalla completa
        </button>
      </div>
      <div class="results-body" id="results-body">
        <span class="empty-msg">Presiona "Iniciar Carrera" para analizar tu código...</span>
      </div>
    </div>

  </div>

  <div class="statusbar">
    <span>🐴</span>
    <span id="status-tokens">Tokens: —</span>
    <span id="status-errors">Errores: —</span>
    <span id="status-symbols">Símbolos: —</span>
    <span class="statusbar-right">UmaScript v1.0 | UTF-8 | Campus Jutiapa 2026</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
